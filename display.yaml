################################################################################
#  CER G5D P4 — Display ESPHome Standalone
#  Hardware : Guition JC8012P4A1C_I_W_Y  (ESP32-P4 + ESP32-C6)
#  Display  : 10.1" MIPI-DSI IPS 800×1280 → landscape 1280×800
#  Touch    : GSL3680 (I2C)
#  ESPHome  : 2026.4.x  |  LVGL 9.x  |  ESP-IDF 5.x
#  Autor    : 2º SGT PAULESKI / DA-DCT
################################################################################

substitutions:
  device_name: "display_p4"
  friendly_name: "display P4"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  includes:
    - wifi_manager.h
    - <esp_wifi.h>
  on_boot:
    - priority: 600
      then:
        - lambda: |-
            WifiManager::init();
            WifiManager::load_credentials_to_ram();
    - priority: 350
      then:
        - lambda: |-
            if (strlen(WifiManager::nvs_ssid) > 0) {
              esphome::wifi::WiFiAP sta;
              sta.set_ssid(std::string(WifiManager::nvs_ssid));
              sta.set_password(std::string(WifiManager::nvs_pass));
              esphome::wifi::global_wifi_component->set_sta(sta);
            }
    - priority: -100
      then:
        - lambda: |-
            WifiManager::apply_credentials_from_ram();
    - priority: -200
      then:
        - lambda: |-
            id(g_sessao_fase)  = 0;
            id(g_sessao_ativa) = false;
            id(g_timer_seg)    = 0;
            id(g_reles_bitmap) = 0;

esp32:
  board: esp32-p4-evboard
  cpu_frequency: 360MHz
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: true

psram:
  speed: 200MHz

esp32_hosted:
  variant: ESP32C6
  active_high: true
  reset_pin: 54
  cmd_pin: 19
  clk_pin: 18
  d0_pin: 14
  d1_pin: 15
  d2_pin: 16
  d3_pin: 17

wifi:
  output_power: 8.5db
  networks:
    - ssid: "TEMP"
      password: "TEMPPASSWORD"
  ap:
    ssid: "display-P4-AP"
    password: "12345678"

captive_portal:

ota:
  - platform: esphome
    password: "ota"

time:
  - platform: sntp
    id: sntp_time
    timezone: "America/Sao_Paulo"

logger:
  hardware_uart: USB_SERIAL_JTAG
  level: INFO

esp_ldo:
  - channel: 3
    voltage: 2.5V

i2c:
  - id: i2c_touch
    sda: GPIO7
    scl: GPIO8
    frequency: 400kHz

output:
  - platform: ledc
    id: backlight_pwm
    pin: GPIO23

light:
  - platform: monochromatic
    id: backlight
    name: "Backlight"
    output: backlight_pwm
    restore_mode: ALWAYS_ON

display:
  - platform: mipi_dsi
    id: main_display
    model: JC8012P4A1
    reset_pin: GPIO27
    auto_clear_enabled: false
    update_interval: never


external_components:
  - source:
      type: local
      path: components
    components: [gsl3680]

touchscreen:
  - platform: gsl3680
    id: touch_panel
    display: main_display
    address: 0x40
    interrupt_pin: GPIO21
    reset_pin: GPIO22
    transform:
      swap_xy: false
      mirror_x: true
      mirror_y: false

