interval:
  - interval: 1s
    then:
      - lambda: |-
          // Update the clock in top-left
          if (id(lbl_relogio) != nullptr) {
            auto now = id(sntp_time).now();
            char tbuf[64];
            if (now.is_valid()) {
              snprintf(tbuf, sizeof(tbuf), "%02d/%02d/%04d   %02d:%02d:%02d",
                       now.day_of_month, now.month, now.year, now.hour, now.minute, now.second);
            } else {
              strncpy(tbuf, "--/--/----   --:--:--", sizeof(tbuf));
            }
            lv_label_set_text(id(lbl_relogio), tbuf);
            
            // Home page clock
            if (id(lbl_home_time) != nullptr) {
                if (now.is_valid()) {
                    char tbuf2[16];
                    snprintf(tbuf2, sizeof(tbuf2), "%02d:%02d", now.hour, now.minute);
                    lv_label_set_text(id(lbl_home_time), tbuf2);
                    
                    const char* days[] = {"Domingo", "Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado"};
                    const char* months[] = {"Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"};
                    
                    if (now.day_of_week >= 1 && now.day_of_week <= 7) {
                        lv_label_set_text(id(lbl_home_day), days[now.day_of_week - 1]);
                    }
                    if (now.month >= 1 && now.month <= 12) {
                        char dbuf[32];
                        snprintf(dbuf, sizeof(dbuf), "%s %02d", months[now.month - 1], now.day_of_month);
                        lv_label_set_text(id(lbl_home_date), dbuf);
                    }
                    
                    lv_arc_set_value(id(arc_clock_outer), (now.second * 100) / 60);
                    lv_arc_set_value(id(arc_clock_inner), (now.minute * 100) / 60);
                }
            }
          }

          if (!id(g_sessao_ativa) || id(g_sessao_pausada)) return;
          id(g_timer_seg)++;
          if (id(g_timer_seg) >= id(g_duracao_seg)) {
            id(g_sessao_ativa)   = false;
            id(g_sessao_pausada) = false;
            id(g_timer_seg)      = id(g_duracao_seg);
            id(scr_fim_sessao).execute();
            return;
          }
          if (id(bar_preparo_prog) != nullptr) {
            int pct = (id(g_timer_seg) * 100) / id(g_duracao_seg);
            lv_bar_set_value(id(bar_preparo_prog), pct, LV_ANIM_ON);
          }
          if (id(lbl_preparo_timer) != nullptr) {
            int rest = id(g_duracao_seg) - id(g_timer_seg);
            char buf[32];
            snprintf(buf, sizeof(buf), "%d segundos restantes", rest);
            lv_label_set_text(id(lbl_preparo_timer), buf);
          }

script:
  - id: scr_refresh_ui
    mode: single
    then:
      - lambda: ";"

  - id: scr_fim_sessao
    mode: single
    then:
      - lambda: |-
          id(g_cafe_selecionado) = 0;
          id(g_reles_bitmap) = 0;
      - lvgl.page.show: pg_principal

  - id: scr_toggle_rele
    mode: queued
    parameters:
      idx: int
    then:
      - lambda: |-
          id(g_reles_bitmap) ^= (1ULL << idx);

