lvgl:
  id: lvgl_main
  displays:
    - main_display
  touchscreens:
    - touch_panel
  color_depth: 16
  buffer_size: 30%
  rotation: 90
  byte_order: little_endian

  theme:
    button:
      bg_color: 0xEEF1F5
      bg_opa: COVER
      border_color: 0xDDE1E8
      border_width: 1
      radius: 8
      text_color: 0x2C3340
      pressed:
        bg_color: 0x9966CB
    label:
      text_color: 0x2C3340
    bar:
      bg_color: 0xDDE1E8
      indicator:
        bg_color: 0x3B82F6

  pages:
    - id: pg_home
      bg_color: 0x0A0908
      widgets:
        - image:
            src: img_bg
            x: 0
            y: 0
            width: 1280
            height: 800

        # Glass Card Container
        - obj:
            id: obj_home_clock_glass
            x: 190
            y: 75
            width: 900
            height: 650
            bg_color: 0x000000
            bg_opa: 50%
            border_color: 0xFFFFFF
            border_width: 1
            border_opa: 20%
            radius: 40
            shadow_color: 0x000000
            shadow_width: 60
            shadow_opa: 60%
            
            widgets:
              # Thick Arc (Outer) - Seconds
              - arc:
                  id: arc_clock_outer
                  x: 350
                  y: 75
                  width: 500
                  height: 500
                  value: 0
                  rotation: 270
                  bg_opa: TRANSP
                  arc_color: 0x444444
                  arc_width: 16
                  indicator:
                    arc_color: 0xFF8C00
                    arc_width: 16
                  knob:
                    bg_color: 0xFF8C00
                    pad_all: 10
                    radius: 24

              # Thin Arc (Inner) - Minutes
              - arc:
                  id: arc_clock_inner
                  x: 374
                  y: 99
                  width: 452
                  height: 452
                  value: 0
                  rotation: 270
                  bg_opa: TRANSP
                  arc_color: 0x444444
                  arc_width: 6
                  indicator:
                    arc_color: 0xFF8C00
                    arc_width: 6
                  knob:
                    bg_color: 0xFF8C00
                    pad_all: 6
                    radius: 16

              # Time Label
              - label:
                  id: lbl_home_time
                  x: 350
                  y: 260
                  width: 500
                  text: "10:49"
                  text_align: CENTER
                  text_font: font_clock_time
                  text_color: 0xFFFFFF

              # Day Label
              - label:
                  id: lbl_home_day
                  x: 40
                  y: 280
                  width: 270
                  text: "Domingo"
                  text_align: RIGHT
                  text_font: font_clock_date
                  text_color: 0xAAAAAA

              # Date Label
